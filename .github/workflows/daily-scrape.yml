name: Daily Education News Scrape

on:
  schedule:
    # 每天上午10点 CDT (15:00 UTC)
    - cron: '0 15 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install beautifulsoup4 requests lxml pandas openpyxl tavily playwright
        playwright install chromium
    
    - name: Run advanced crawler
      env:
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      run: |
        cd edu-news-hub
        python3 scripts/advanced_crawler.py || echo "Advanced crawler failed, trying fallback..."
        python3 scripts/dual_source_fetcher.py || echo "Fallback also failed"
    
    - name: Update index
      run: |
        cd edu-news-hub
        python3 -c "
import json
import datetime
date_str = datetime.datetime.now().strftime('%Y-%m-%d')
with open('data/index.json', 'r') as f:
    idx = json.load(f)
if date_str not in idx['dates']:
    idx['dates'].insert(0, date_str)
    idx['total_days'] = len(idx['dates'])
idx['last_updated'] = datetime.datetime.now().isoformat()
with open('data/index.json', 'w') as f:
    json.dump(idx, f, indent=2)
print(f'Updated index with {date_str}')
"
    
    - name: Commit and push changes
      run: |
        cd edu-news-hub
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/ history/ sources/
        git diff --staged --quiet || (git commit -m "📰 Daily news update $(date +%Y-%m-%d-%H:%M)" && git push)
    
    - name: Upload artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: scrape-logs
        path: |
          edu-news-hub/*.log
          edu-news-hub/data/*.json
