name: Daily Education News Scrape

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install beautifulsoup4 requests lxml pandas tavily || echo "Some packages failed but continuing..."
    
    - name: Check directory
      run: |
        echo "Current directory: $(pwd)"
        ls -la
        ls -la scripts/ 2>/dev/null || echo "No scripts directory at root"
        ls -la edu-news-hub/scripts/ 2>/dev/null || echo "No edu-news-hub/scripts directory"
    
    - name: Run scraper
      continue-on-error: true
      env:
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      run: |
        echo "Starting scraper..."
        if [ -f "scripts/dual_source_fetcher.py" ]; then
          echo "Running from root..."
          python3 -u scripts/dual_source_fetcher.py 2>&1 | tee scraper.log || echo "Script failed but continuing..."
        else
          echo "Script not found!"
          find . -name "*.py" | head -10
        fi
        echo "Scraper finished"
    
    - name: Debug output
      run: |
        echo "=== Scraper log ==="
        cat scraper.log 2>/dev/null || echo "No log file"
        echo ""
        echo "=== Data directory ==="
        ls -la data/ 2>/dev/null || echo "No data dir"
        echo ""
        echo "=== Today's file check ==="
        TODAY=$(date +%Y-%m-%d)
        if [ -f "data/${TODAY}.json" ]; then
          echo "Found data/${TODAY}.json"
          wc -l "data/${TODAY}.json"
        else
          echo "data/${TODAY}.json NOT FOUND"
        fi
    
    - name: Commit changes
      run: |
        git config user.email "action@github.com"
        git config user.name "GitHub Action"
        git add -A
        git status
        git commit -m "Daily news update $(date +%Y-%m-%d)" || echo "Nothing to commit"
        git push || echo "Push failed or nothing to push"
