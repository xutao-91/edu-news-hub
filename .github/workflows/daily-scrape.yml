name: Daily Education News Scrape

on:
  schedule:
    # 每天上午10点 CDT (15:00 UTC)
    - cron: '0 15 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Debug - Check secrets
      run: |
        echo "Checking if TAVILY_API_KEY is set..."
        if [ -z "${{ secrets.TAVILY_API_KEY }}" ]; then
          echo "❌ TAVILY_API_KEY is NOT set!"
        else
          echo "✅ TAVILY_API_KEY is set"
        fi
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install beautifulsoup4 requests lxml pandas openpyxl tavily playwright
        playwright install chromium
        echo "✅ Dependencies installed"
    
    - name: Check directory structure
      run: |
        pwd
        ls -la
        ls -la edu-news-hub/ 2>/dev/null || echo "No edu-news-hub directory at root"
    
    - name: Run advanced crawler
      env:
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      run: |
        if [ -f "scripts/advanced_crawler.py" ]; then
          echo "Running from root..."
          python3 scripts/advanced_crawler.py 2>&1 || echo "Advanced crawler failed"
        elif [ -f "edu-news-hub/scripts/advanced_crawler.py" ]; then
          cd edu-news-hub
          echo "Running from edu-news-hub..."
          python3 scripts/advanced_crawler.py 2>&1 || echo "Advanced crawler failed"
        else
          echo "❌ advanced_crawler.py not found"
        fi
    
    - name: Run fallback crawler
      if: always()
      env:
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      run: |
        if [ -f "scripts/dual_source_fetcher.py" ]; then
          python3 scripts/dual_source_fetcher.py 2>&1 || echo "Fallback also failed"
        elif [ -f "edu-news-hub/scripts/dual_source_fetcher.py" ]; then
          cd edu-news-hub
          python3 scripts/dual_source_fetcher.py 2>&1 || echo "Fallback also failed"
        fi
    
    - name: Update index
      if: always()
      run: |
        python3 << 'PYTHON_EOF'
import json
import datetime
import os

# Find data directory
if os.path.exists('data/index.json'):
    index_path = 'data/index.json'
elif os.path.exists('edu-news-hub/data/index.json'):
    index_path = 'edu-news-hub/data/index.json'
else:
    print("No index.json found")
    exit(0)

date_str = datetime.datetime.now().strftime('%Y-%m-%d')

try:
    with open(index_path, 'r') as f:
        idx = json.load(f)
except:
    idx = {'dates': [], 'total_days': 0}

if date_str not in idx.get('dates', []):
    idx['dates'].insert(0, date_str)
    idx['total_days'] = len(idx['dates'])

idx['last_updated'] = datetime.datetime.now().isoformat()

with open(index_path, 'w') as f:
    json.dump(idx, f, indent=2)

print(f'Updated index with {date_str}')
PYTHON_EOF
    
    - name: Commit and push changes
      if: always()
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add -A
        git diff --staged --quiet || (git commit -m "📰 Daily news update $(date +%Y-%m-%d-%H:%M)" && git push)
    
    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: scrape-logs-${{ github.run_number }}
        path: |
          *.log
          data/*.json
          edu-news-hub/*.log
          edu-news-hub/data/*.json
