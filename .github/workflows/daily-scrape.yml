name: Daily Education News Scrape

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        pip install beautifulsoup4 requests lxml pandas tavily
    
    - name: Run scraper
      env:
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      run: |
        cd edu-news-hub
        python3 scripts/dual_source_fetcher.py || true
    
    - name: Commit changes
      run: |
        git config user.email "action@github.com"
        git config user.name "GitHub Action"
        git add .
        git commit -m "Daily update $(date +%Y-%m-%d)" || true
        git push
