name: Daily Education News Scrape

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install beautifulsoup4 requests lxml pandas tavily
    
    - name: Run scraper
      continue-on-error: true
      env:
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      run: |
        echo "Starting scraper..."
        python3 scripts/dual_source_fetcher.py 2>&1 | tee scraper.log || echo "Script completed with warnings"
        echo "Scraper finished"
    
    - name: Update index.json
      run: |
        python3 << 'EOF'
import json
import datetime
import os
import glob

# Find all data JSON files
data_files = glob.glob('data/2026-*.json')
dates = []

for f in data_files:
    basename = os.path.basename(f)
    if basename.startswith('2026-') and basename.endswith('.json'):
        date_str = basename.replace('.json', '')
        dates.append(date_str)

# Sort dates (newest first)
dates.sort(reverse=True)

# Update index
with open('data/index.json', 'r') as f:
    idx = json.load(f)

idx['dates'] = dates
idx['total_days'] = len(dates)
idx['last_updated'] = datetime.datetime.now().isoformat()

with open('data/index.json', 'w') as f:
    json.dump(idx, f, indent=2, ensure_ascii=False)

print(f'Updated index with {len(dates)} dates: {dates[:5]}')
EOF
    
    - name: Commit changes
      run: |
        git config user.email "action@github.com"
        git config user.name "GitHub Action"
        git add -A
        git status
        git commit -m "📰 Daily news update $(date +%Y-%m-%d)" || echo "Nothing to commit"
        git push
