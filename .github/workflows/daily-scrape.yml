name: Daily Education News Scrape

on:
  schedule:
    # 每天上午10点 CDT (15:00 UTC)
    - cron: '0 15 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Debug - Check secrets
      run: |
        echo "Checking if TAVILY_API_KEY is set..."
        if [ -z "${{ secrets.TAVILY_API_KEY }}" ]; then
          echo "❌ TAVILY_API_KEY is NOT set!"
        else
          echo "✅ TAVILY_API_KEY is set (length: ${#TAVILY_API_KEY})"
        fi
      env:
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install beautifulsoup4 requests lxml pandas openpyxl tavily playwright
        playwright install chromium
        echo "✅ Dependencies installed"
    
    - name: Check directory structure
      run: |
        pwd
        ls -la
        ls -la edu-news-hub/ || echo "No edu-news-hub directory"
    
    - name: Run advanced crawler
      env:
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      run: |
        if [ -d "edu-news-hub" ]; then
          cd edu-news-hub
          echo "Running advanced crawler..."
          python3 scripts/advanced_crawler.py 2>&1 || echo "Advanced crawler failed with exit code $?"
        else
          echo "Running from root..."
          python3 scripts/advanced_crawler.py 2>&1 || echo "Advanced crawler failed with exit code $?"
        fi
    
    - name: Run fallback crawler
      if: always()
      env:
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      run: |
        if [ -d "edu-news-hub" ]; then
          cd edu-news-hub
          echo "Running fallback crawler..."
          python3 scripts/dual_source_fetcher.py 2>&1 || echo "Fallback also failed with exit code $?"
        else
          python3 scripts/dual_source_fetcher.py 2>&1 || echo "Fallback also failed with exit code $?"
        fi
    
    - name: Update index
      if: always()
      run: |
        WORKDIR="."
        if [ -d "edu-news-hub" ]; then
          WORKDIR="edu-news-hub"
        fi
        cd $WORKDIR
        python3 -c "
import json
import datetime
date_str = datetime.datetime.now().strftime('%Y-%m-%d')
try:
    with open('data/index.json', 'r') as f:
        idx = json.load(f)
except:
    idx = {'dates': [], 'total_days': 0}
if date_str not in idx['dates']:
    idx['dates'].insert(0, date_str)
    idx['total_days'] = len(idx['dates'])
idx['last_updated'] = datetime.datetime.now().isoformat()
with open('data/index.json', 'w') as f:
    json.dump(idx, f, indent=2)
print(f'Updated index with {date_str}')
"
    
    - name: Commit and push changes
      if: always()
      run: |
        WORKDIR="."
        if [ -d "edu-news-hub" ]; then
          WORKDIR="edu-news-hub"
        fi
        cd $WORKDIR
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add -A
        git diff --staged --quiet || (git commit -m "📰 Daily news update $(date +%Y-%m-%d-%H:%M)" && git push)
    
    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: scrape-logs-${{ github.run_number }}
        path: |
          *.log
          data/*.json
          edu-news-hub/*.log
          edu-news-hub/data/*.json
