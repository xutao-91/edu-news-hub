name: Daily News from User Sources

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install requests beautifulsoup4 lxml feedparser
    
    - name: Scrape from user sources
      run: |
        cd edu-news-hub
        python3 scripts/scrape_user_sources.py
    
    - name: Update index and deploy
      run: |
        cd edu-news-hub
        python3 scripts/update_index.py
        cp data/*.json docs/data/
        git config user.email "action@github.com"
        git config user.name "GitHub Action"
        git add docs/
        git commit -m "Daily news $(date +%Y-%m-%d)" || true
        git push
