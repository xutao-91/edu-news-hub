name: Daily News from User Sources

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Create daily news
      run: |
        DATE=$(date +%Y-%m-%d)
        cat > data/${DATE}.json << EOF
{
  "date": "${DATE}",
  "generated_at": "$(date -Iseconds)",
  "generated_by": "Open Claw",
  "source_method": "User sources",
  "total_news": 0,
  "news": [],
  "note": "System ready - manual data population needed"
}
EOF
        echo "Created data/${DATE}.json"
        cat data/${DATE}.json
    
    - name: Update index
      run: |
        ls data/2026-*.json | sed 's/data\//"/' | sed 's/.json/",/' | sort -r | head -10 > dates.txt
        echo '{"dates":[' | cat - dates.txt | sed '$ s/,$/]/'
        
    - name: Deploy
      run: |
        cp data/*.json docs/data/ 2>/dev/null || true
        git config user.email "action@github.com"
        git config user.name "GitHub Action"
        git add -A
        git commit -m "Daily update $(date +%Y-%m-%d)" || true
        git push || true
