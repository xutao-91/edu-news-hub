name: Daily Education News Update

on:
  schedule:
    # 每天 10:00 CDT (15:00 UTC)
    - cron: '0 15 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install requests
        
    - name: Fetch and compile education news
      env:
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      run: |
        python3 scripts/fetch_and_compile_news.py --date=$(date +%Y-%m-%d)
        
    - name: Update index
      run: |
        python3 scripts/update_index.py
        
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/
        git diff --staged --quiet || (git commit -m "📰 Auto update: $(date +%Y-%m-%d) 教育新闻简报（中文编译）" && git push)
