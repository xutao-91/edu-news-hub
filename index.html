<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美国教育新闻动态 | Education News Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .news-card {
            transition: all 0.3s ease;
        }
        .news-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .category-badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-radius: 9999px;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .date-picker {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white shadow-lg">
        <div class="max-w-6xl mx-auto px-4 py-6">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <div class="flex items-center space-x-3 mb-4 md:mb-0">
                    <i class="fas fa-graduation-cap text-3xl"></i>
                    <div>
                        <h1 class="text-2xl font-bold">美国教育新闻动态</h1>
                        <p class="text-blue-100 text-sm">Education News Hub - 中西部聚焦</p>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="https://github.com/xutao-91/edu-news-hub" target="_blank" class="text-white hover:text-blue-200 transition">
                        <i class="fab fa-github text-xl"></i>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-4 py-8">
        <!-- Date Selector -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-8">
            <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                <div class="flex items-center space-x-4">
                    <label class="text-gray-700 font-medium">
                        <i class="far fa-calendar-alt mr-2"></i>选择日期：
                    </label>
                    <input type="date" id="datePicker" class="date-picker px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                </div>
                <div class="flex items-center space-x-2 text-sm text-gray-600">
                    <span class="w-3 h-3 rounded-full bg-red-500"></span><span>联邦政策</span>
                    <span class="w-3 h-3 rounded-full bg-blue-500"></span><span>AI教育</span>
                    <span class="w-3 h-3 rounded-full bg-green-500"></span><span>高等教育</span>
                    <span class="w-3 h-3 rounded-full bg-purple-500"></span><span>师资</span>
                    <span class="w-3 h-3 rounded-full bg-orange-500"></span><span>国际生</span>
                </div>
            </div>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white rounded-lg shadow p-4 text-center">
                <div class="text-2xl font-bold text-blue-600" id="totalNews">-</div>
                <div class="text-sm text-gray-600">今日新闻</div>
            </div>
            <div class="bg-white rounded-lg shadow p-4 text-center">
                <div class="text-2xl font-bold text-indigo-600" id="totalDays">-</div>
                <div class="text-sm text-gray-600">历史天数</div>
            </div>
            <div class="bg-white rounded-lg shadow p-4 text-center">
                <div class="text-2xl font-bold text-green-600" id="latestUpdate">-</div>
                <div class="text-sm text-gray-600">最近更新</div>
            </div>
            <div class="bg-white rounded-lg shadow p-4 text-center">
                <div class="text-2xl font-bold text-purple-600">11州</div>
                <div class="text-sm text-gray-600">覆盖范围</div>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="hidden text-center py-12">
            <div class="loading mb-4"></div>
            <p class="text-gray-600">正在加载新闻数据...</p>
        </div>

        <!-- Error State -->
        <div id="errorState" class="hidden text-center py-12">
            <i class="fas fa-exclamation-circle text-red-500 text-4xl mb-4"></i>
            <p class="text-gray-600">暂无该日期的新闻数据</p>
            <button onclick="loadToday()" class="mt-4 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                查看今天
            </button>
        </div>

        <!-- News List -->
        <div id="newsContainer" class="space-y-4">
            <!-- News items will be inserted here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-12">
            <i class="far fa-newspaper text-gray-300 text-6xl mb-4"></i>
            <p class="text-gray-500">暂无新闻数据</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-gray-400 py-6 mt-12">
        <div class="max-w-6xl mx-auto px-4 text-center">
            <p class="text-sm">
                <i class="fas fa-robot mr-2"></i>由 Open Claw 自动生成 | 
                <i class="fas fa-sync-alt mr-2"></i>每日更新 |
                <i class="fas fa-database mr-2"></i>来源: 115+教育新闻源
            </p>
            <p class="text-xs mt-2 text-gray-500">
                覆盖范围: 联邦政策 + 全国性研究（含中西部11州）+ 州级动态
            </p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
